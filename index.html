<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dirty Bean Water Shop</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #14101a;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }
    #game-container {
      box-shadow: 0 0 0 4px #3a2e4a;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- Phaser is bundled locally in js/lib so the game works with no internet
       connection and no dependency on a CDN being reachable -->
  <script src="js/lib/phaser.min.js"></script>

  <!-- Game scenes, then the config that wires them together -->
  <script src="js/utils/icons.js"></script>
  <script src="js/utils/character.js"></script>
  <script src="js/utils/topdown.js"></script>
  <script src="js/scenes/CharacterCreatorScene.js"></script>
  <script src="js/scenes/ShopBrandingScene.js"></script>
  <script src="js/scenes/ShopFloorScene.js"></script>
  <script src="js/scenes/BackyardScene.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
